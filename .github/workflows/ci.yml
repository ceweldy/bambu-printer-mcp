name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev
      - run: npm run privacy:check
      - run: npm run privacy:history
        env:
          PRIVACY_SCAN_REF: ${{ github.sha }}
          PRIVACY_SCAN_SKIP_SYNTHETIC_TIP_METADATA: ${{ github.event_name == 'pull_request' && '1' || '0' }}
      - run: npm pack --dry-run
